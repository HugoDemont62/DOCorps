name: CI

on:
  push:
    branches: [main, develop, "features/**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # 1. Product API — Python / FastAPI / Pytest
  # ─────────────────────────────────────────
  test-product-api:
    name: Tests Product API (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: product-api/requirements.txt

      - name: Install dependencies
        working-directory: product-api
        run: pip install -r requirements.txt

      - name: Run Pytest
        working-directory: product-api
        env:
          JWT_SECRET: test-secret-key
          DATABASE_PATH: ":memory:"
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # 2. Auth API — PHP / PHPUnit
  # ─────────────────────────────────────────
  test-auth-api:
    name: Tests Auth API (PHP)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Install Composer dependencies
        working-directory: auth-api
        run: composer install --no-progress --prefer-dist

      - name: Run PHPUnit
        working-directory: auth-api
        env:
          JWT_SECRET: test-secret-key
          DB_PATH: ":memory:"
        run: vendor/bin/phpunit --colors=always --no-coverage

  # ─────────────────────────────────────────
  # 3. Frontend — Node.js / Vitest / ESLint
  # ─────────────────────────────────────────
  test-frontend:
    name: Tests Frontend (React/Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm test

      - name: Build (vérification)
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────
  # 4. SonarQube — Analyse qualité de code
  # ─────────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [test-product-api, test-auth-api, test-frontend]
    if: |
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/features/') ||
      github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true
