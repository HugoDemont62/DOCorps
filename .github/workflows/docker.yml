name: Docker Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/docorps

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: product-api
            context: ./product-api
            dockerfile: Dockerfile
          - name: auth-api
            context: ./auth-api
            dockerfile: Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: Dockerfile
          - name: prometheus
            context: ./infra/monitoring
            dockerfile: Dockerfile.prometheus
          - name: grafana
            context: ./infra/monitoring
            dockerfile: Dockerfile.grafana

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Redéploiement automatique sur Render ──────────────────────────────────────
  deploy-render:
    name: Redeploy on Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render redeploys
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          services=(
            "srv-d7h2q337uimc73d3g43g"
            "srv-d7h2q328qa3s73csr0t0"
            "srv-d7h2q328qa3s73csr0rg"
            "srv-d7h2q357vvec73aljif0"
            "srv-d7h2q358nd3s73ecc2n0"
          )
          for id in "${services[@]}"; do
            echo -n "Redeploying $id → "
            curl -s -X POST "https://api.render.com/v1/services/$id/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','?'))"
          done
