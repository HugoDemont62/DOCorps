name: Keep Alive — Render Free Tier

on:
  schedule:
    - cron: '*/10 * * * *'  # toutes les 10 minutes
  workflow_dispatch:

jobs:
  ping:
    name: Ping Render Services
    runs-on: ubuntu-latest

    steps:
      - name: Ping all services
        run: |
          services=(
            "https://docorps-frontend.onrender.com"
            "https://docorps-auth-api.onrender.com/health"
            "https://docorps-product-api.onrender.com/health"
            "https://docorps-prometheus.onrender.com/-/healthy"
            "https://docorps-grafana.onrender.com/api/health"
          )

          for url in "${services[@]}"; do
            echo -n "Ping $url → "
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url")
            echo "$code"
          done
