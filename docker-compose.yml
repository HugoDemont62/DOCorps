# ===================================
# DEVOPSCORP - Docker Compose
# ===================================
# Pour démarrer : docker compose up --build
# Variables : copier .env.example vers .env (les valeurs par défaut ci-dessous suffisent en local)

services:
  # -----------------------------------
  # FRONTEND - React Application
  # -----------------------------------
  frontend:
    container_name: devopscorp-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_AUTH_API_URL=http://localhost:8080
      - VITE_PRODUCT_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - devopscorp-network
    depends_on:
      - auth-api
      - product-api
    restart: unless-stopped

  # -----------------------------------
  # AUTH API - PHP (SQLite)
  # -----------------------------------
  auth-api:
    container_name: devopscorp-auth-api
    build:
      context: ./auth-api
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DB_PATH=database/auth.db
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600}
      - BCRYPT_COST=12
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - ./auth-api/database:/var/www/html/database
    networks:
      - devopscorp-network
    restart: unless-stopped

  # -----------------------------------
  # PRODUCT API - Python / FastAPI
  # -----------------------------------
  product-api:
    container_name: devopscorp-product-api
    build:
      context: ./product-api
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-devopscorp_products}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./product-api:/app
    networks:
      - devopscorp-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------
  # MYSQL (optionnel — Auth utilise SQLite)
  # -----------------------------------
  mysql:
    container_name: devopscorp-mysql
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-devopscorp}
      MYSQL_USER: ${MYSQL_USER:-devopscorp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devopscorp_password}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - devopscorp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 5s
    restart: unless-stopped

  # -----------------------------------
  # POSTGRESQL
  # -----------------------------------
  postgres:
    container_name: devopscorp-postgres
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devopscorp_products}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - devopscorp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-devopscorp_products}"]
      timeout: 20s
      retries: 10
      interval: 5s
    restart: unless-stopped

  # -----------------------------------
  # PROMETHEUS - Monitoring
  # -----------------------------------
  prometheus:
    container_name: devopscorp-prometheus
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - devopscorp-network
    restart: unless-stopped

  # -----------------------------------
  # GRAFANA - Dashboards
  # -----------------------------------
  grafana:
    container_name: devopscorp-grafana
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - devopscorp-network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  devopscorp-network:
    driver: bridge
    name: devopscorp-network

volumes:
  mysql-data:
    name: devopscorp-mysql-data
  postgres-data:
    name: devopscorp-postgres-data
  prometheus-data:
    name: devopscorp-prometheus-data
  grafana-data:
    name: devopscorp-grafana-data
