# ===================================
# inventory.ini — Inventaire Ansible
# ===================================
# Remplacez les valeurs par vos vraies infos de serveur.
# Usage : ansible-playbook -i inventory.ini playbook.yml

[devopscorp_servers]
# Format : alias ansible_host=IP ansible_user=USER ansible_ssh_private_key_file=CHEMIN_CLE
prod-server ansible_host=YOUR_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[devopscorp_servers:vars]
# Python 3 requis sur le serveur distant
ansible_python_interpreter=/usr/bin/python3
