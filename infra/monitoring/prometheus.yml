# ===================================
# prometheus.yml — Configuration Prometheus
# ===================================
# Prometheus scrape les /metrics de chaque service toutes les 15 secondes.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# ── Alertes ───────────────────────────────────────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Jobs de scraping ──────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus se surveille lui-même
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Product API (FastAPI expose /metrics via prometheus-fastapi-instrumentator)
  - job_name: product-api
    static_configs:
      - targets: [product-api:5000]
    metrics_path: /metrics

  # Auth API (PHP — health check comme proxy de disponibilité)
  - job_name: auth-api
    static_configs:
      - targets: [auth-api:80]
    metrics_path: /health

  # Frontend (Nginx — statut basique via stub_status)
  - job_name: frontend
    static_configs:
      - targets: [frontend:3000]
    metrics_path: /health
